<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- White background circle -->
  <circle cx="50" cy="50" r="49" fill="white"/>
  <!-- Outer dark navy ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#1B2A8C" stroke-width="6"/>
  <!-- Red decorative inner ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#CC0000" stroke-width="1.5"/>
  <!-- White compass face -->
  <circle cx="50" cy="50" r="37" fill="white"/>

  <!-- Tick marks at 12 positions (30-degree intervals) between outer and inner ring -->
  <!-- N (0°) -->
  <line x1="50" y1="5" x2="50" y2="11" stroke="#CC0000" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 30° -->
  <line x1="71" y1="11" x2="68.5" y2="16.3" stroke="#1B2A8C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 60° -->
  <line x1="89" y1="29" x2="83.7" y2="31.5" stroke="#1B2A8C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- E (90°) -->
  <line x1="89" y1="50" x2="95" y2="50" stroke="#CC0000" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 120° -->
  <line x1="89" y1="71" x2="83.7" y2="68.5" stroke="#1B2A8C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 150° -->
  <line x1="71" y1="89" x2="68.5" y2="83.7" stroke="#1B2A8C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- S (180°) -->
  <line x1="50" y1="89" x2="50" y2="95" stroke="#CC0000" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 210° -->
  <line x1="29" y1="89" x2="31.5" y2="83.7" stroke="#1B2A8C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 240° -->
  <line x1="11" y1="71" x2="16.3" y2="68.5" stroke="#1B2A8C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- W (270°) -->
  <line x1="5" y1="50" x2="11" y2="50" stroke="#CC0000" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 300° -->
  <line x1="11" y1="29" x2="16.3" y2="31.5" stroke="#1B2A8C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 330° -->
  <line x1="29" y1="11" x2="31.5" y2="16.3" stroke="#1B2A8C" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Compass star - N/S axis (red, vertical diamond) -->
  <path d="M50 18 L57 50 L50 82 L43 50 Z" fill="#CC0000"/>
  <!-- Compass star - E/W axis (white, horizontal diamond) -->
  <path d="M82 50 L50 43 L18 50 L50 57 Z" fill="white" stroke="#CC0000" stroke-width="1"/>

  <!-- Center red circle -->
  <circle cx="50" cy="50" r="6" fill="#CC0000"/>
</svg>
